services:
  dash-db:
    # Durable Apache AGE + pgvector image. PGDATA has shared_preload_libraries='age',
    # so recreating cp-db on the plain pgvector image fails to boot (missing age.so).
    # This bakes AGE in → recreate is boot-safe. Build: docker compose build dash-db
    image: cp-db-age:pg18
    build:
      context: .
      dockerfile: db/Dockerfile.age
    container_name: cp-db
    restart: always
    command: >
      postgres
        -c max_connections=300
        -c shared_buffers=1GB
        -c work_mem=32MB
        -c effective_cache_size=3GB
        -c maintenance_work_mem=256MB
        -c password_encryption=scram-sha-256
        -c idle_in_transaction_session_timeout=60000
        -c statement_timeout=120000
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER required}
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS required}
      POSTGRES_DB: ${DB_DATABASE:?DB_DATABASE required}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      # -d so it probes the real DB (not just the postmaster socket), and
      # start_period covers first-boot initdb on a cold volume (AWS) so the
      # init seeder never fires into a not-yet-ready DB and dies exit 2.
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:?DB_USER required} -d ${DB_DATABASE:?DB_DATABASE required}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - dash
    deploy:
      resources:
        limits:
          memory: 4G

  dash-pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: cp-pgbouncer
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      DATABASE_URL: postgres://${DB_USER:?DB_USER required}:${DB_PASS:?DB_PASS required}@dash-db:5432/${DB_DATABASE:?DB_DATABASE required}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 3000
      DEFAULT_POOL_SIZE: 80
      MIN_POOL_SIZE: 20
      RESERVE_POOL_SIZE: 20
      MAX_DB_CONNECTIONS: 200
      SERVER_RESET_QUERY: DISCARD ALL
      SERVER_IDLE_TIMEOUT: 300
      CLIENT_IDLE_TIMEOUT: 600
      QUERY_WAIT_TIMEOUT: 30
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,options
    depends_on:
      dash-db:
        condition: service_healthy
    networks:
      - dash
    deploy:
      resources:
        limits:
          memory: 512M

  # One-shot DB seeder. Loads the complete baseline schema (db/baseline/schema.sql
  # + migrations_seed.sql) into a FRESH database so a brand-new cloud install comes
  # up clean on the FIRST boot — no manual `scripts/init_fresh_db.sh` step needed.
  # Uses the AGE/pgvector postgres image because it ships `psql` (the app image does
  # not). IDEMPOTENT + guarded: if public.dash_projects already exists it exits 0
  # immediately and touches nothing — so existing/populated installs are unaffected.
  # dash-api waits for this to complete successfully before booting.
  dash-init:
    image: cp-db-age:pg18
    container_name: cp-init
    restart: "no"
    environment:
      PGHOST: dash-db
      PGPORT: "5432"
      PGUSER: ${DB_USER:?DB_USER required}
      PGPASSWORD: ${DB_PASS:?DB_PASS required}
      PGDATABASE: ${DB_DATABASE:?DB_DATABASE required}
    volumes:
      - ./db/baseline:/baseline:ro
    entrypoint:
      - /bin/sh
      - -ec
      - |
        echo "[init] waiting for postgres at $$PGHOST:$$PGPORT (db=$$PGDATABASE user=$$PGUSER)..."
        ready=""
        i=1
        while [ "$$i" -le 60 ]; do
          if psql -tAc "SELECT 1" >/dev/null 2>&1; then ready=1; echo "[init] db reachable after $$i attempt(s)."; break; fi
          echo "[init] db not ready yet ($$i/60) — retrying in 2s..."
          sleep 2
          i=$$((i + 1))
        done
        if [ -z "$$ready" ]; then
          echo "[init] FATAL: could not connect to $$PGHOST:$$PGPORT after 120s. Last psql error:"
          psql -tAc "SELECT 1" || true
          exit 2
        fi
        echo "[init] checking if database already has schema..."
        exists="$$(psql -tAc "SELECT to_regclass('public.dash_projects') IS NOT NULL")"
        if [ "$$exists" = "t" ]; then
          echo "[init] public.dash_projects exists - DB already initialized, skipping baseline load."
          exit 0
        fi
        echo "[init] fresh database detected - loading baseline schema..."
        psql -v ON_ERROR_STOP=1 -q -f /baseline/schema.sql
        echo "[init] seeding migration tracking rows..."
        psql -v ON_ERROR_STOP=1 -q -f /baseline/migrations_seed.sql
        tbls="$$(psql -tAc "SELECT count(*) FROM information_schema.tables WHERE table_schema IN ('public','dash','citypharma')")"
        echo "[init] baseline loaded: $$tbls tables. Done."
    depends_on:
      dash-db:
        condition: service_healthy
    networks:
      - dash

  dash-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-citypharma}:${IMAGE_TAG:-latest}
    container_name: cp-api
    command: gunicorn -c scripts/gunicorn_conf.py app.main:app
    restart: always
    ports:
      - "127.0.0.1:8011:8000"
    environment:
      # Core
      - RUNTIME_ENV=prd
      - PYTHONPATH=/app
      - AGNO_DEBUG=False
      - AGNO_TELEMETRY=${AGNO_TELEMETRY:-false}
      - OTEL_SDK_DISABLED=${OTEL_SDK_DISABLED:-true}
      - AGENTOS_URL=http://127.0.0.1:8000
      # Single-agent product lock (CityPharma)
      - SINGLE_AGENT_MODE=${SINGLE_AGENT_MODE:-1}
      - LOCKED_PROJECT_SLUG=${LOCKED_PROJECT_SLUG:-citypharma}
      - PRODUCT_NAME=${PRODUCT_NAME:-CityAgent Pharma}
      # Database — goes through PgBouncer
      - DB_HOST=dash-pgbouncer
      - DB_PORT=5432
      - DB_USER=${DB_USER:?DB_USER required}
      - DB_PASS=${DB_PASS:?DB_PASS required}
      - DB_DATABASE=${DB_DATABASE:?DB_DATABASE required}
      # Scaling
      - RATE_LIMIT=${RATE_LIMIT:-500/minute}
      # OpenAI-compat gateway: per-store-key rate cap (Redis-backed, global)
      - API_GW_RATE_PER_MIN=${API_GW_RATE_PER_MIN:-60}
      - REDIS_URL=${REDIS_URL:-redis://dash-redis:6379}
      # Required
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # Multi-key pool (round-robin + per-key 429 cooldown) for 1000-store scale
      - OPENROUTER_API_KEYS=${OPENROUTER_API_KEYS:-}
      # Gunicorn worker count (concurrent-chat ceiling)
      - WORKERS=${WORKERS:-4}
      # Canonical public origin for embed snippets/SDK/docs (set to AWS domain,
      # e.g. https://pharma.yourdomain.com). Blank → frontend uses the browser origin.
      - PUBLIC_URL=${PUBLIC_URL:-}
      # Dead-daemon gates — no external connectors / pruned verticals single-tenant
      - CONNECTOR_SCHEDULER_DISABLED=${CONNECTOR_SCHEDULER_DISABLED:-1}
      - VERTICAL_DAEMONS_DISABLED=${VERTICAL_DAEMONS_DISABLED:-1}
      # Gateway chat-body logging → dash_apigw_messages (powers per-key Questions
      # drill-down + auto-learn harvest). PII: keep on only with consent.
      - APIGW_LOG_BODIES=${APIGW_LOG_BODIES:-1}
      # Embed widget chat-body logging → dash_embed_calls.message_text/response_text
      # (powers the Monitoring QUESTION/ANSWER panels). PII: consumer chat — consent only.
      - EMBED_LOG_BODIES=${EMBED_LOG_BODIES:-1}
      # Embedding-call input text → dash_apigw_usage.input_preview (powers the
      # Usage → Embeddings drill-down "with the question"). Privacy opt-in.
      - EMBED_LOG_INPUT=${EMBED_LOG_INPUT:-1}
      # DEV: caching OFF for real fresh test/eval behaviour. PROD: APIGW_CACHE_TTL=90,
      # drop METRIC_SHORTCUT_DISABLED (cache hides the 70-220s repeat-question latency).
      - APIGW_CACHE_TTL=${APIGW_CACHE_TTL:-90}
      - METRIC_SHORTCUT_DISABLED=${METRIC_SHORTCUT_DISABLED:-0}
      # Per-store API service accounts (svc:outlet-<code>) auto-minted on data
      # load when on. 0 = off (no auto svc:outlet-* keys). 2026-06-09.
      - APIGW_AUTO_PROVISION=${APIGW_AUTO_PROVISION:-0}
      # Engineer semantic-layer matview builder during training. 0 = off. 2026-06-09.
      - ENGINEER_SEMANTIC_LAYER=${ENGINEER_SEMANTIC_LAYER:-0}
      # Catalog LLM gap-fill + low-risk auto-apply during training. 0 = off
      # (articles_enriched view still rebuilds for manual approvals). 2026-06-10.
      - CATALOG_ENRICH=${CATALOG_ENRICH:-0}
      - CATALOG_ENRICH_LIMIT=${CATALOG_ENRICH_LIMIT:-200}
      # Concurrent agent runs for the chat tier (embed + chat share this async
      # semaphore). 20 = true 20-store-parallel embed load; raise for more.
      - LLM_PARALLEL_CAP_CHAT=${LLM_PARALLEL_CAP_CHAT:-20}
      # Models (3-tier with auto-fallback via OpenRouter models[])
      - CHAT_MODEL=${CHAT_MODEL:-google/gemini-3-flash-preview}
      - DEEP_MODEL=${DEEP_MODEL:-google/gemini-3-flash-preview}
      - LITE_MODEL=${LITE_MODEL:-google/gemini-3-flash-preview}
      - MID_MODEL=${MID_MODEL:-google/gemini-3-flash-preview}
      - REASONING_MODEL=${REASONING_MODEL:-google/gemini-3-flash-preview}
      - ULTRA_MODEL=${ULTRA_MODEL:-google/gemini-3-flash-preview}
      - TRAINING_MODEL=${TRAINING_MODEL:-}
      - CHAT_FALLBACKS=${CHAT_FALLBACKS:-}
      - DEEP_FALLBACKS=${DEEP_FALLBACKS:-}
      - LITE_FALLBACKS=${LITE_FALLBACKS:-}
      - SUPER_ADMIN=${SUPER_ADMIN:?SUPER_ADMIN required}
      - SUPER_ADMIN_PASS=${SUPER_ADMIN_PASS:?SUPER_ADMIN_PASS required}
      # Blank is a VALID value: app falls back to PUBLIC_URL, else allows all
      # origins without credentials. Use :- (default empty), NOT :? (which
      # rejects an empty string and breaks cold installs shipping a blank .env).
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - DOMAIN=${DOMAIN:-localhost}
      # Optional — Keycloak SSO
      - KEYCLOAK_URL=${KEYCLOAK_URL:-}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-dash}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-dash-app}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-}
      # Optional — Slack
      - SLACK_TOKEN=${SLACK_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      # Phase 9 — Skills auto-inject (Layer 14) + skl_pptx_builder
      - EXPERIMENTAL_AGI=${EXPERIMENTAL_AGI:-0}
      # Deep Deck enrichment — Pexels hero images (optional, free 200/hr tier)
      - PEXELS_API_KEY=${PEXELS_API_KEY:-}
      # PPTX rendering — native python-pptx, in-process (no sidecar).
      - PPTX_ENGINE=${PPTX_ENGINE:-native}
      # Training Pipeline V2 — Phase E (vertical detect+apply via fingerprint-cached step runner). Default off.
      - TRAINING_V2_PHASE_E=${TRAINING_V2_PHASE_E:-0}
    volumes:
      - knowledge_data:/app/knowledge
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      dash-db:
        condition: service_healthy
      dash-init:
        condition: service_completed_successfully
      dash-pgbouncer:
        condition: service_healthy
      dash-redis:
        condition: service_healthy
    networks:
      - dash
    deploy:
      resources:
        limits:
          memory: 8G

  dash-redis:
    image: redis:7-alpine
    container_name: cp-redis
    restart: unless-stopped
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - dash
    deploy:
      resources:
        limits:
          memory: 512M

  caddy:
    image: caddy:2-alpine
    container_name: cp-caddy
    restart: always
    ports:
      - "8090:80"
      - "8453:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dash-api
    networks:
      - dash
    deploy:
      resources:
        limits:
          memory: 512M

  dash-ml:
    # Opt-in (2026-05-20 trim). Only needed for AutoML (gated off) + the
    # TRAIN-ALL anomaly-model pre-train for tables >1000 rows + 24h retrain.
    # All 6 Data Scientist chat tools run INLINE in dash-api and do NOT need
    # this worker. Start it with: docker compose --profile ml up -d dash-ml
    profiles: ["ml"]
    build:
      context: .
      dockerfile: ml_worker/Dockerfile
    container_name: cp-ml
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER:?DB_USER required}:${DB_PASS:?DB_PASS required}@dash-pgbouncer:5432/${DB_DATABASE:?DB_DATABASE required}
      - DB_HOST=dash-pgbouncer
      - DB_PORT=5432
      - DB_USER=${DB_USER:?DB_USER required}
      - DB_PASS=${DB_PASS:?DB_PASS required}
      - DB_DATABASE=${DB_DATABASE:?DB_DATABASE required}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - CHAT_MODEL=${CHAT_MODEL:-google/gemini-3-flash-preview}
      - DEEP_MODEL=${DEEP_MODEL:-google/gemini-3-flash-preview}
      - LITE_MODEL=${LITE_MODEL:-google/gemini-3-flash-preview}
      - MID_MODEL=${MID_MODEL:-google/gemini-3-flash-preview}
      - REASONING_MODEL=${REASONING_MODEL:-google/gemini-3-flash-preview}
      - ULTRA_MODEL=${ULTRA_MODEL:-google/gemini-3-flash-preview}
      - TRAINING_MODEL=${TRAINING_MODEL:-}
      - CHAT_FALLBACKS=${CHAT_FALLBACKS:-}
      - DEEP_FALLBACKS=${DEEP_FALLBACKS:-}
      - LITE_FALLBACKS=${LITE_FALLBACKS:-}
    depends_on:
      dash-db:
        condition: service_healthy
      dash-pgbouncer:
        condition: service_healthy
    networks:
      - dash
    deploy:
      resources:
        limits:
          memory: 2G

  # Optional: stdio MCP bridge for local IDE integrations.
  # Claude Desktop / Cursor / Windsurf connect via `docker exec -i dash-mcp …`.
  # Opt-in: `docker compose --profile mcp up -d dash-mcp`.
  dash-mcp:
    image: citypharma:latest
    container_name: cp-mcp
    restart: unless-stopped
    command: ["tail", "-f", "/dev/null"]  # idle; clients invoke `docker exec -i dash-mcp python -m mcp_server`
    environment:
      - DB_HOST=dash-pgbouncer
      - DB_PORT=5432
      - DB_USER=${DB_USER:?DB_USER required}
      - DB_PASS=${DB_PASS:?DB_PASS required}
      - DB_DATABASE=${DB_DATABASE:?DB_DATABASE required}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - CHAT_MODEL=${CHAT_MODEL:-google/gemini-3-flash-preview}
      - DEEP_MODEL=${DEEP_MODEL:-google/gemini-3-flash-preview}
      - LITE_MODEL=${LITE_MODEL:-google/gemini-3-flash-preview}
      - MID_MODEL=${MID_MODEL:-google/gemini-3-flash-preview}
      - REASONING_MODEL=${REASONING_MODEL:-google/gemini-3-flash-preview}
      - ULTRA_MODEL=${ULTRA_MODEL:-google/gemini-3-flash-preview}
      - SUPER_ADMIN=${SUPER_ADMIN:?SUPER_ADMIN required}
      - DASH_MCP_LOG_LEVEL=${DASH_MCP_LOG_LEVEL:-INFO}
    depends_on:
      dash-pgbouncer:
        condition: service_healthy
      dash-api:
        condition: service_started
    networks:
      - dash
    deploy:
      resources:
        limits:
          memory: 512M
    profiles:
      - mcp

  # Nightly pg_dump backup → /var/backups/dash, 7-day retention.
  # Updates public.dash_system_status.last_backup_at after each successful dump,
  # which is surfaced on /health. See docs/BACKUP.md for restore.
  dash-backup:
    image: postgres:18-alpine
    container_name: cp-backup
    restart: unless-stopped
    # Alpine doesn't ship python by default — install it once, then run daemon.
    command: ["sh", "-c", "apk add --no-cache python3 >/dev/null && exec python3 /opt/backup/backup_daemon.py"]
    environment:
      - DB_HOST=dash-db
      - DB_PORT=5432
      - DB_USER=${DB_USER:?DB_USER required}
      - DB_PASS=${DB_PASS:?DB_PASS required}
      - DB_DATABASE=${DB_DATABASE:?DB_DATABASE required}
      - BACKUP_DIR=/var/backups/dash
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./cron/backup_daemon.py:/opt/backup/backup_daemon.py:ro
      - backup_data:/var/backups/dash
    depends_on:
      dash-db:
        condition: service_healthy
    networks:
      - dash
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  dash:

volumes:
  pgdata:
  knowledge_data:
  backup_data:
  caddy_data:
  caddy_config:
  redis_data:
