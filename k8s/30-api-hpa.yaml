# ===========================================================================
# dash-api HorizontalPodAutoscaler
# ---------------------------------------------------------------------------
# Purpose: Scale dash-api between 3 and 10 pods based on CPU and memory.
# Behavior:
#   - Scale up FAST   : up to 2 pods every 30s when load spikes.
#   - Scale down SLOW : 1 pod / 60s, 5-min stabilization to absorb traffic
#                       valleys without flapping.
#
# Dependencies:
#   - Deployment    : dash-api (see 30-api-deploy.yaml)
#   - metrics-server installed in the cluster (kubectl top pod must work).
# ===========================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dash-api
  labels:
    app: dash-api
    component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dash-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Max
