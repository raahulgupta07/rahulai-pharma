# Replace placeholders OR generate via sealed-secrets/Vault before apply.
# Do NOT commit real values. Values are stringData (plain text); k8s base64-encodes on write.
# For production prefer: SealedSecrets, External Secrets Operator, or HashiCorp Vault Agent injection.
apiVersion: v1
kind: Secret
metadata:
  name: dash-secrets
  namespace: dash
  labels:
    app: dash
type: Opaque
stringData:
  # Required
  OPENROUTER_API_KEY: "REPLACE_ME_OPENROUTER_API_KEY"
  DB_PASS: "REPLACE_ME_DB_PASS"
  SUPER_ADMIN_PASS: "REPLACE_ME_SUPER_ADMIN_PASS"

  # Microsoft Entra ID (SharePoint connector) — optional
  MS_CLIENT_ID: "REPLACE_ME_MS_CLIENT_ID"
  MS_CLIENT_SECRET: "REPLACE_ME_MS_CLIENT_SECRET"
  MS_TENANT_ID: "REPLACE_ME_MS_TENANT_ID"

  # Google OAuth (Google Drive connector) — optional
  GOOGLE_CLIENT_ID: "REPLACE_ME_GOOGLE_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "REPLACE_ME_GOOGLE_CLIENT_SECRET"

  # Keycloak SSO — optional
  KEYCLOAK_CLIENT_SECRET: "REPLACE_ME_KEYCLOAK_CLIENT_SECRET"

  # Slack notifications — optional
  SLACK_TOKEN: "REPLACE_ME_SLACK_TOKEN"
