# ServiceAccount: dash-sa
# Single workload identity used by every dash-* Deployment / StatefulSet
# in the `dash` namespace. Keeps RBAC scope narrow and makes audit logs
# attributable to one identity.
#
# automountServiceAccountToken is left at the default (true) because the
# optional Role below grants get/list/watch on configmaps + secrets for
# in-process runtime config reload. If that feature is unused, set this
# to false to avoid mounting a kube API token into every pod.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dash-sa
  namespace: dash
  labels:
    app: dash
    component: rbac
automountServiceAccountToken: true
