# Lightweight forgetting-curve decay cron. Cheap, no LLM. Runs hourly-early
# at 03:00 UTC (before the daily learning cycle so decay state is fresh).

apiVersion: batch/v1
kind: CronJob
metadata:
  name: dash-learning-decay
  namespace: dash
  labels: {app: dash, component: learning}
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels: {app: dash, component: learning}
        spec:
          restartPolicy: OnFailure
          containers:
          - name: trigger
            image: curlimages/curl:8
            command: ["/bin/sh","-c"]
            args:
            - |
              set -e
              echo "Triggering forgetting-curve decay..."
              curl -fsS -X POST \
                -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                "${DASH_API}/api/learning/decay" \
                --max-time 300 \
                || { echo "[error] decay failed"; exit 1; }
              echo "Done."
            env:
            - name: DASH_API
              value: "http://dash-api.dash.svc.cluster.local:8000"
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dash-secrets
                  key: ADMIN_API_TOKEN
            resources:
              requests: {cpu: 25m, memory: 32Mi}
              limits: {cpu: 100m, memory: 64Mi}
