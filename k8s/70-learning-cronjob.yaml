# Daily self-learning cycle. Triggers POST /api/learning/cycle/* via dash-api
# service. Replaces in-process scheduler under multi-replica HPA.

apiVersion: batch/v1
kind: CronJob
metadata:
  name: dash-learning-daily
  namespace: dash
  labels: {app: dash, component: learning}
spec:
  # Run at 04:00 UTC daily — off-peak. Adjust per your timezone.
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels: {app: dash, component: learning}
        spec:
          restartPolicy: OnFailure
          containers:
          - name: trigger
            image: curlimages/curl:8
            command: ["/bin/sh","-c"]
            args:
            - |
              set -e
              echo "Triggering self-learning cycles..."
              # Fetch list of opt-in projects via internal admin endpoint
              SLUGS=$(curl -fsS \
                -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                "${DASH_API}/api/learning/projects/optin" \
                | tr -d '\n' | sed 's/.*"slugs":\[\([^]]*\)\].*/\1/' \
                | tr -d '"' | tr ',' '\n' | grep -v '^$')
              for slug in $SLUGS; do
                echo "  -> cycle: $slug"
                curl -fsS -X POST \
                  -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                  "${DASH_API}/api/learning/cycle/${slug}" \
                  --max-time 1800 \
                  -o /tmp/cycle_${slug}.log \
                  || echo "    [warn] cycle for $slug failed"
              done
              echo "Triggering central cycle..."
              curl -fsS -X POST \
                -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                "${DASH_API}/api/learning/cycle/central" \
                --max-time 1800 \
                || echo "  [warn] central cycle failed"
              echo "Done."
            env:
            - name: DASH_API
              value: "http://dash-api.dash.svc.cluster.local:8000"
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dash-secrets
                  key: ADMIN_API_TOKEN
            resources:
              requests: {cpu: 50m, memory: 64Mi}
              limits: {cpu: 200m, memory: 128Mi}
