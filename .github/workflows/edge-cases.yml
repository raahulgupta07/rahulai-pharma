name: Edge-case E2E suite

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# 2026-05-25 Phase 6 — PR gate: every PR runs the 15-fixture E2E test set.
# Failing fixture blocks PR. Covers: multi-byte text (Burmese/CJK/Arabic),
# Decimal-heavy numerics, constant cols, NaN/Inf, mixed types, huge strings,
# auto-injected lineage cols, empty/single-row/million-row, duplicate PK,
# unicode filenames, mixed date formats, PII payloads.
#
# Pre-existing utility code is in dash/utils/ — every defensive helper has
# one home. New bug found via fixture → patch in dash/utils/ → propagates
# everywhere via import. Bug rate target: < 1 per release.

jobs:
  e2e:
    name: Run E2E edge-case fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip + Docker layers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            /tmp/.buildx-cache
          key: ${{ runner.os }}-edge-cases-${{ hashFiles('requirements.txt') }}

      - name: Boot Dash stack via Docker Compose
        run: |
          docker compose -f compose.yaml up -d --build dash-db dash-pgbouncer dash-api
          echo "Waiting for dash-api healthcheck..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8001/api/health > /dev/null 2>&1; then
              echo "API healthy after ${i}0s"
              break
            fi
            sleep 10
          done
          curl -fsS http://localhost:8001/api/health || { echo "API failed to start"; docker compose logs dash-api --tail=200; exit 1; }

      - name: Install pytest + test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Run edge-case E2E suite
        env:
          DASH_API_BASE: http://localhost:8001/api
          DASH_TEST_USER: demo
          DASH_TEST_PASS: demo
        run: |
          make test-edge-cases

      - name: Capture container logs on failure
        if: failure()
        run: |
          docker compose -f compose.yaml logs dash-api --tail=500
          docker compose -f compose.yaml logs dash-db --tail=200

      - name: Tear down
        if: always()
        run: docker compose -f compose.yaml down -v

  rls-isolation:
    name: RLS cross-tenant isolation (Track C1)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Boot Dash stack via Docker Compose
        run: |
          docker compose -f compose.yaml up -d --build dash-db dash-pgbouncer dash-api
          echo "Waiting for dash-api healthcheck..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8001/api/health > /dev/null 2>&1; then
              echo "API healthy after ${i}0s"
              break
            fi
            sleep 10
          done
          curl -fsS http://localhost:8001/api/health || { echo "API failed to start"; docker compose logs dash-api --tail=200; exit 1; }

      - name: Install pytest + requests
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Run RLS cross-tenant suite
        env:
          DASH_API_BASE: http://localhost:8001/api
        run: |
          make test-rls

      - name: Capture container logs on failure
        if: failure()
        run: |
          docker compose -f compose.yaml logs dash-api --tail=500
          docker compose -f compose.yaml logs dash-db --tail=200

      - name: Tear down
        if: always()
        run: docker compose -f compose.yaml down -v

  lint-safe-dumps:
    name: Lint raw json.dumps usage
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Reject raw json.dumps in app/ + dash/ (except dash/utils/safe_json.py)
        run: |
          # PR review gate: forces safe_dumps adoption across codebase.
          # Allow exceptions: tests/, dash/utils/safe_json.py itself.
          violations=$(grep -rn "json\.dumps(" app/ dash/ \
            --include='*.py' \
            --exclude-dir=__pycache__ \
            | grep -v 'dash/utils/safe_json\.py' \
            | grep -v 'tests/' \
            || true)
          if [ -n "$violations" ]; then
            echo "❌ raw json.dumps() found — use safe_dumps from dash.utils.safe_json:"
            echo "$violations"
            echo ""
            echo "Migration: replace 'import json' + 'json.dumps(x)' with 'from dash.utils import safe_dumps' + 'safe_dumps(x)'."
            echo "Allowed exceptions: dash/utils/safe_json.py, tests/."
            # NOTE: starts as WARN-only (exit 0) — set exit 1 once full codebase migrated.
            exit 0
          fi
          echo "✓ no raw json.dumps violations"
