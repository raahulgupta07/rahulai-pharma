{{- if .Values.benchmarkSync.cronEnabled }}
{{- $fullName := include "dash.fullname" . -}}
{{- $ns := .Values.namespace -}}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $fullName }}-benchmark-sync-weekly
  namespace: {{ $ns }}
  labels:
    app: dash
    component: benchmark-sync
spec:
  # Default: Sunday 04:00 UTC.
  schedule: {{ .Values.benchmarkSync.schedule | default "0 4 * * 0" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: {{ default 3600 .Values.benchmarkSync.activeDeadlineSeconds }}
      template:
        metadata:
          labels:
            app: dash
            component: benchmark-sync
        spec:
          restartPolicy: OnFailure
          containers:
          - name: trigger
            image: curlimages/curl:8
            command: ["/bin/sh","-c"]
            args:
            - |
              set -e
              echo "[benchmark-sync] dispatching sync-now"
              curl -fsS -X POST \
                -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                "${DASH_API}/api/ontology/benchmarks/sync-now" \
                --max-time 1800 \
                || { echo "[error] benchmark-sync failed"; exit 1; }
              echo "Done."
            env:
            - name: DASH_API
              value: "http://{{ $fullName }}-api.{{ $ns }}.svc.cluster.local:8000"
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $fullName }}-secrets
                  key: ADMIN_API_TOKEN
            resources:
              requests: {cpu: 100m, memory: 128Mi}
              limits:   {cpu: 500m, memory: 256Mi}
{{- end }}
