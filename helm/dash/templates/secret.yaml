apiVersion: v1
kind: Secret
metadata:
  name: dash-secrets
  labels:
    {{- include "dash.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Required
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | quote }}
  DB_PASS: {{ .Values.secrets.dbPass | quote }}
  SUPER_ADMIN_PASS: {{ .Values.secrets.superAdminPass | quote }}

  # Microsoft Entra ID (SharePoint connector) — optional
  MS_CLIENT_ID: {{ .Values.secrets.msClientId | quote }}
  MS_CLIENT_SECRET: {{ .Values.secrets.msClientSecret | quote }}
  MS_TENANT_ID: {{ .Values.secrets.msTenantId | quote }}

  # Google OAuth (Google Drive connector) — optional
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | quote }}

  # Keycloak SSO — optional
  KEYCLOAK_CLIENT_SECRET: {{ .Values.secrets.keycloakClientSecret | quote }}

  # Slack notifications — optional
  SLACK_TOKEN: {{ .Values.secrets.slackToken | quote }}
