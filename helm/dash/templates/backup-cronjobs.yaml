{{- if .Values.backup.enabled }}
{{- range .Values.backup.cronJobs }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "dash.fullname" $ }}-{{ .name }}
  labels:
    {{- include "dash.labels" $ | nindent 4 }}
spec:
  schedule: {{ .schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .keepHistory | default 7 }}
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 3600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: backup
            image: postgres:18-trixie
            command: ["/bin/sh", "/scripts/backup.sh"]
            envFrom:
            - configMapRef: { name: {{ include "dash.fullname" $ }}-config }
            - secretRef: { name: {{ include "dash.fullname" $ }}-secrets }
            env:
            - name: BACKUP_TYPES
              value: {{ .types | default "db,knowledge" | quote }}
            volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: knowledge
              mountPath: /app/knowledge
              readOnly: true
          volumes:
          - name: scripts
            configMap:
              name: {{ include "dash.fullname" $ }}-backup-scripts
              defaultMode: 0755
          - name: knowledge
            persistentVolumeClaim:
              claimName: {{ include "dash.fullname" $ }}-knowledge-data
---
{{- end }}
{{- end }}
