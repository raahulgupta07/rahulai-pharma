{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "dash.fullname" . }}-role
  labels:
    {{- include "dash.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "dash.fullname" . }}-rolebinding
  labels:
    {{- include "dash.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "dash.serviceAccountName" . }}
roleRef:
  kind: Role
  name: {{ include "dash.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
