{{- if .Values.learning.cronEnabled }}
{{- $fullName := include "dash.fullname" . -}}
{{- $ns := .Values.namespace -}}
{{- range .Values.learning.cronJobs }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $fullName }}-learning-{{ .name }}
  namespace: {{ $ns }}
  labels:
    app: dash
    component: learning
    cron: {{ .name }}
spec:
  schedule: {{ .schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: {{ default 3600 .activeDeadlineSeconds }}
      template:
        metadata:
          labels:
            app: dash
            component: learning
            cron: {{ .name }}
        spec:
          restartPolicy: OnFailure
          containers:
          - name: trigger
            image: curlimages/curl:8
            command: ["/bin/sh","-c"]
            args:
            - |
              set -e
              echo "[{{ .name }}] dispatching to {{ .endpoint }}{{ .args }}"
              {{- if eq .endpoint "/decay" }}
              curl -fsS -X POST \
                -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                "${DASH_API}/api/learning/decay" \
                --max-time 300 \
                || { echo "[error] decay failed"; exit 1; }
              {{- else }}
              SLUGS=$(curl -fsS \
                -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                "${DASH_API}/api/learning/projects/optin" \
                | tr -d '\n' | sed 's/.*"slugs":\[\([^]]*\)\].*/\1/' \
                | tr -d '"' | tr ',' '\n' | grep -v '^$')
              for slug in $SLUGS; do
                echo "  -> {{ .name }} cycle: $slug"
                curl -fsS -X POST \
                  -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                  "${DASH_API}/api/learning/cycle/${slug}{{ .args }}" \
                  --max-time 1800 \
                  || echo "    [warn] $slug failed"
              done
              echo "  -> {{ .name }} central"
              curl -fsS -X POST \
                -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                "${DASH_API}/api/learning/cycle/central{{ .args }}" \
                --max-time 1800 \
                || echo "  [warn] central failed"
              {{- end }}
              echo "Done."
            env:
            - name: DASH_API
              value: "http://{{ $fullName }}-api.{{ $ns }}.svc.cluster.local:8000"
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $fullName }}-secrets
                  key: ADMIN_API_TOKEN
            resources:
              requests: {cpu: 50m, memory: 64Mi}
              limits:   {cpu: 200m, memory: 128Mi}
{{- end }}
{{- end }}
